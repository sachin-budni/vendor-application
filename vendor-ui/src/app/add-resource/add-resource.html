<div class="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6" aria-labelledby="modal-title" role="dialog"
  aria-modal="true">
  <!-- Backdrop -->
  <div class="fixed inset-0 bg-gray-500/60 transition-opacity backdrop-blur-sm" (click)="onClose()"></div>

  <!-- Modal panel -->
  <div
    class="relative transform overflow-hidden rounded-[20px] bg-white text-left shadow-2xl transition-all sm:w-full sm:max-w-7xl max-h-[90vh] flex flex-col">

    <!-- Modal header -->
    <div class="px-7 py-5 flex items-center justify-between border-b border-gray-100/80 bg-white shrink-0">
      <h3 class="text-xl font-extrabold text-gray-900 tracking-tight" id="modal-title">
        Add Resource
      </h3>
      <button type="button" (click)="onClose()"
        class="rounded-full p-1.5 text-gray-400 hover:bg-gray-100 hover:text-gray-600 transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-500">
        <span class="sr-only">Close</span>
        <lucide-angular [img]="X" class="h-5 w-5"></lucide-angular>
      </button>
    </div>

    <!-- Modal body bg-[#f8fafc] -->
    <div class="px-8 py-7 overflow-y-auto bg-[#f8fafc] flex-1">
      <form [formGroup]="resourceForm" class="space-y-6">

        <!-- CORE INFORMATION -->
        <div class="bg-white rounded-[16px] border border-gray-100 p-6 shadow-sm">
          <h4 class="text-[11px] font-bold text-gray-400 uppercase tracking-widest mb-5">Core Information</h4>

          <div class="space-y-5">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
              @if (isAdmin) {
              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Select Vendor</label>
                <div class="relative">
                  <select formControlName="vendorId"
                    class="w-full h-11 pl-3.5 pr-10 appearance-none bg-[#f1f5f9] border-transparent rounded-xl text-sm text-gray-700 focus:border-indigo-500 focus:bg-white focus:ring-2 focus:ring-indigo-500/20 transition-all font-medium">
                    <option value="" disabled selected>Choose a vendor</option>
                    @for (v of vendors; track v.vendorId) {
                    <option [value]="v.vendorId">{{ v.vendorName }}</option>
                    }
                  </select>
                  <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-3.5 text-gray-400">
                    <lucide-angular [img]="ChevronDown" class="h-4 w-4"></lucide-angular>
                  </div>
                </div>
              </div>
              } @else {
              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Vendor</label>
                <div
                  class="w-full h-11 px-3.5 bg-gray-50 border border-gray-100 rounded-xl text-sm text-indigo-700 font-bold flex items-center shadow-inner">
                  {{ loggedInVendorName }}
                </div>
              </div>
              }

              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Discipline</label>
                <div class="relative">
                  <select formControlName="disciplineId"
                    class="w-full h-11 pl-3.5 pr-10 appearance-none bg-[#f1f5f9] border-transparent rounded-xl text-sm text-gray-700 focus:border-indigo-500 focus:bg-white focus:ring-2 focus:ring-indigo-500/20 transition-all font-medium">
                    <option value="" disabled selected>Select discipline</option>
                    @for (d of disciplines; track d.disciplineId) {
                    <option [value]="d.disciplineId">{{ d.disciplineName }}</option>
                    }
                  </select>
                  <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-3.5 text-gray-400">
                    <lucide-angular [img]="ChevronDown" class="h-4 w-4"></lucide-angular>
                  </div>
                </div>
              </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-3 gap-5">
              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Engineer Name</label>
                <input type="text" formControlName="rtuEngineerName" placeholder="Enter full name"
                  class="w-full h-11 px-3.5 bg-[#f1f5f9] border-transparent rounded-xl text-sm text-gray-900 placeholder:text-gray-400 focus:border-indigo-500 focus:bg-white focus:ring-2 focus:ring-indigo-500/20 transition-all font-medium">
              </div>
              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">HWL Manager</label>
                <input type="text" formControlName="hwlManager" placeholder="Manager's name"
                  class="w-full h-11 px-3.5 bg-[#f1f5f9] border-transparent rounded-xl text-sm text-gray-900 placeholder:text-gray-400 focus:border-indigo-500 focus:bg-white focus:ring-2 focus:ring-indigo-500/20 transition-all font-medium">
              </div>
              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Group</label>
                <div class="relative">
                  <select formControlName="groupId"
                    class="w-full h-11 pl-3.5 pr-10 appearance-none bg-[#f1f5f9] border-transparent rounded-xl text-sm text-gray-700 focus:border-indigo-500 focus:bg-white focus:ring-2 focus:ring-indigo-500/20 transition-all font-medium">
                    <option value="" disabled selected>Select group</option>
                    @for (g of groups; track g.groupId) {
                    <option [value]="g.groupId">{{ g.groupName }}</option>
                    }
                  </select>
                  <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-3.5 text-gray-400">
                    <lucide-angular [img]="ChevronDown" class="h-4 w-4"></lucide-angular>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- PROFESSIONAL EXPERTISE -->
        <div class="bg-white rounded-[16px] border border-gray-100 p-6 shadow-sm">
          <h4 class="text-[11px] font-bold text-gray-400 uppercase tracking-widest mb-5">Professional Expertise</h4>

          <div class="grid grid-cols-1 sm:grid-cols-4 gap-x-5 gap-y-5">
            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-2">Skill Level</label>
              <div class="relative">
                <select formControlName="skillLevelId"
                  class="w-full h-11 pl-3.5 pr-10 appearance-none bg-[#f1f5f9] border-transparent rounded-xl text-sm text-gray-700 focus:border-indigo-500 focus:bg-white focus:ring-2 focus:ring-indigo-500/20 transition-all font-medium">
                  <option value="" disabled selected>Select level</option>
                  @for (s of skillLevels; track s.skillLevelId) {
                  <option [value]="s.skillLevelId">{{s.skillCode}} - {{ s.skillName }}</option>
                  }
                </select>
                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-3.5 text-gray-400">
                  <lucide-angular [img]="ChevronDown" class="h-4 w-4"></lucide-angular>
                </div>
              </div>
            </div>

            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-2">Current Project</label>
              <input type="text" formControlName="currentProjectName" placeholder="e.g. Project Alpha"
                class="w-full h-11 px-3.5 bg-[#f1f5f9] border-transparent rounded-xl text-sm text-gray-900 placeholder:text-gray-400 focus:border-indigo-500 focus:bg-white focus:ring-2 focus:ring-indigo-500/20 transition-all font-medium">
            </div>

            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-2">Total Experience (Years)</label>
              <div class="relative">
                <input type="number" formControlName="totalExperienceInYears" placeholder="0"
                  class="w-full h-11 pl-3.5 pr-12 bg-[#f1f5f9] border-transparent rounded-xl text-sm text-gray-900 placeholder:text-gray-400 focus:border-indigo-500 focus:bg-white focus:ring-2 focus:ring-indigo-500/20 transition-all font-medium">
                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-3.5">
                  <span class="text-[10px] font-bold text-gray-400 tracking-wider">YRS</span>
                </div>
              </div>
            </div>

            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-2">Relevant Experience (Years)</label>
              <div class="relative">
                <input type="number" formControlName="totalExperienceInRTU" placeholder="0"
                  class="w-full h-11 pl-3.5 pr-12 bg-[#f1f5f9] border-transparent rounded-xl text-sm text-gray-900 placeholder:text-gray-400 focus:border-indigo-500 focus:bg-white focus:ring-2 focus:ring-indigo-500/20 transition-all font-medium">
                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-3.5">
                  <span class="text-[10px] font-bold text-gray-400 tracking-wider">YRS</span>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- AVAILABILITY & NOTES -->
        <div class="bg-white rounded-[16px] border border-gray-100 p-6 shadow-sm">
          <h4 class="text-[11px] font-bold text-gray-400 uppercase tracking-widest mb-5">Availability & Notes</h4>

          <div class="space-y-5">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Available From</label>
                <div class="relative">
                  <input type="date" formControlName="dateAvailableForm"
                    class="w-full h-11 px-3.5 bg-[#f1f5f9] border-transparent rounded-xl text-sm text-gray-700 focus:border-indigo-500 focus:bg-white focus:ring-2 focus:ring-indigo-500/20 transition-all font-medium">
                </div>
              </div>
            </div>

            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-2">Remarks</label>
              <textarea formControlName="remarks" rows="3" placeholder="Add any additional notes here..."
                class="w-full p-4 bg-[#f1f5f9] border-transparent rounded-xl text-sm text-gray-900 placeholder:text-gray-400 focus:border-indigo-500 focus:bg-white focus:ring-2 focus:ring-indigo-500/20 transition-all font-medium resize-none"></textarea>
            </div>
          </div>
        </div>

      </form>
    </div>

    <!-- Modal footer -->
    <div class="px-8 py-5 bg-[#f8fafc] border-t flex items-center justify-end gap-3 shrink-0 rounded-b-[20px]">
      <button type="button" (click)="onClose()"
        class="px-5 py-2.5 text-sm font-bold text-indigo-600 bg-transparent rounded-xl hover:bg-indigo-50 active:bg-indigo-100 transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 focus:ring-offset-[#f8fafc]">
        Cancel
      </button>
      <button type="button" (click)="onSubmit()" [disabled]="isSaving"
        class="px-6 py-2.5 text-sm font-bold text-white bg-[#3b82f6] shadow-sm hover:bg-blue-600 rounded-xl transition-all active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 focus:ring-offset-[#f8fafc] disabled:opacity-75 disabled:cursor-wait">
        {{ isSaving ? 'Submitting...' : 'Submit' }}
      </button>
    </div>
  </div>
</div>
